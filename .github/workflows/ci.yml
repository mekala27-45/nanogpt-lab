name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, type-check & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies (CPU torch)
        run: |
          python -m pip install -U pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Ruff
        run: ruff check src tests

      - name: Black
        run: black --check src tests

      - name: Mypy
        run: mypy

      - name: Pytest (incl. KV-cache equivalence & overfit-a-batch; excl. slow)
        run: pytest -m "not slow" --cov --cov-report=term-missing

  docker:
    name: Docker build & import smoke
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t nanogpt-lab:ci .
      - name: Import smoke test
        run: docker run --rm nanogpt-lab:ci python -c "import nanogpt_lab, torch; print('torch', torch.__version__)"
