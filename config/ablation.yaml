# Ablation config: a small, fast model so four variants train in a reasonable
# time on CPU. Absolute loss is worse than the smoke model; the point is the
# *relative* comparison between architecture choices on identical data/seed.
seed: 1337

data:
  corpus: shakespeare
  url: "https://raw.githubusercontent.com/karpathy/char-rnn/master/data/tinyshakespeare/input.txt"
  sha256: "86c4e6aa9db7c042ec79f339dcb96d42b0075e16b8fc2e86bf0ca57e2dc565ed"
  cache_dir: "data"
  val_fraction: 0.1

model:
  n_layer: 3
  n_head: 4
  n_embd: 96
  block_size: 64
  dropout: 0.0
  mlp_ratio: 4
  rope_theta: 10000.0
  tie_weights: true
  norm: rms
  pos: rope
  mlp: swiglu

train:
  batch_size: 32
  max_iters: 300
  eval_interval: 300
  eval_iters: 40
  warmup_iters: 50
  lr: 1.0e-3
  min_lr: 1.0e-4
  weight_decay: 0.1
  grad_clip: 1.0
  device: auto
  compile: false
  out_dir: checkpoints

generate:
  max_new_tokens: 80
  temperature: 0.8
  top_k: 50
  prompt: "\n"
