# Smoke config: small enough to train on CPU (this repo's reproducible default).
# Trains a ~1M-param Llama-style char model on Tiny Shakespeare in a few minutes.
seed: 1337

data:
  corpus: shakespeare
  url: "https://raw.githubusercontent.com/karpathy/char-rnn/master/data/tinyshakespeare/input.txt"
  sha256: "86c4e6aa9db7c042ec79f339dcb96d42b0075e16b8fc2e86bf0ca57e2dc565ed"
  cache_dir: "data"
  val_fraction: 0.1

model:
  n_layer: 4
  n_head: 4
  n_embd: 128
  block_size: 128
  dropout: 0.0
  mlp_ratio: 4
  rope_theta: 10000.0
  tie_weights: true
  norm: rms       # rms | layer     (ablation toggle)
  pos: rope       # rope | learned  (ablation toggle)
  mlp: swiglu     # swiglu | gelu   (ablation toggle)

train:
  batch_size: 32
  max_iters: 2000
  eval_interval: 250
  eval_iters: 100
  warmup_iters: 100
  lr: 1.0e-3
  min_lr: 1.0e-4
  weight_decay: 0.1
  grad_clip: 1.0
  device: auto    # auto | cpu | cuda
  compile: false
  out_dir: checkpoints

generate:
  max_new_tokens: 300
  temperature: 0.8
  top_k: 50
  prompt: "\n"
